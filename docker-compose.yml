services:
  mongo:
    image: mongo:8
    container_name: formgrid-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: formgrid
      MONGO_INITDB_ROOT_PASSWORD: formgrid
      MONGO_INITDB_DATABASE: formgrid
    volumes:
      - mongodata:/data/db

volumes:
  mongodata:
